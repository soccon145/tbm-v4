<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Minh hoạ Bộ Dưỡng Sinh Nhập Môn — line art theo palette EG -->
  <rect width="800" height="500" fill="#F7ECD8"/>
  <rect x="14" y="14" width="772" height="472" fill="none" stroke="#DCCFB4" stroke-width="1.5"/>
  <rect x="22" y="22" width="756" height="456" fill="none" stroke="#DCCFB4" stroke-width="0.6" opacity="0.7"/>

  <!-- vòng tròn trang trí mờ -->
  <circle cx="690" cy="80" r="150" fill="none" stroke="#8A1820" stroke-width="0.8" opacity="0.10"/>
  <circle cx="690" cy="80" r="190" fill="none" stroke="#8A1820" stroke-width="0.8" opacity="0.06"/>
  <circle cx="90" cy="430" r="120" fill="none" stroke="#8A1820" stroke-width="0.8" opacity="0.08"/>

  <g stroke="#8A1820" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cây vỗ bát huyệt (trái) -->
    <g transform="translate(120,130)">
      <ellipse cx="0" cy="0" rx="34" ry="58"/>
      <ellipse cx="0" cy="0" rx="20" ry="42" opacity="0.5" stroke-width="2"/>
      <line x1="0" y1="58" x2="0" y2="200"/>
      <circle cx="0" cy="212" r="9"/>
      <circle cx="-12" cy="-14" r="2.6" fill="#8A1820" stroke="none"/>
      <circle cx="12" cy="-14" r="2.6" fill="#8A1820" stroke="none"/>
      <circle cx="0" cy="10" r="2.6" fill="#8A1820" stroke="none"/>
      <circle cx="-12" cy="34" r="2.6" fill="#8A1820" stroke="none"/>
      <circle cx="12" cy="34" r="2.6" fill="#8A1820" stroke="none"/>
    </g>

    <!-- Búa ngải cứu -->
    <g transform="translate(280,150)">
      <circle cx="0" cy="0" r="40"/>
      <path d="M -28 -28 Q 0 -52 28 -28" opacity="0.5" stroke-width="2"/>
      <line x1="0" y1="40" x2="0" y2="180"/>
      <path d="M -8 180 L 8 180" />
    </g>

    <!-- Lược gỗ -->
    <g transform="translate(450,140)">
      <path d="M -60 0 Q 0 -56 60 0"/>
      <line x1="-60" y1="0" x2="-60" y2="64"/>
      <line x1="-30" y1="-18" x2="-30" y2="70"/>
      <line x1="0" y1="-26" x2="0" y2="74"/>
      <line x1="30" y1="-18" x2="30" y2="70"/>
      <line x1="60" y1="0" x2="60" y2="64"/>
    </g>

    <!-- Gua sha -->
    <g transform="translate(620,150)">
      <path d="M 0 -44 C 42 -44 58 -8 44 22 C 32 48 10 56 0 56 C -10 56 -32 48 -44 22 C -58 -8 -42 -44 0 -44 Z"/>
      <path d="M -20 -10 Q 0 8 20 -10" opacity="0.5" stroke-width="2"/>
    </g>

    <!-- Chậu ngâm chân + hơi nước (giữa dưới) -->
    <g transform="translate(400,360)">
      <path d="M -110 0 L 110 0 L 88 64 Q 86 74 74 74 L -74 74 Q -86 74 -88 64 Z"/>
      <line x1="-122" y1="0" x2="122" y2="0" stroke-width="4"/>
      <path d="M -34 -18 Q -26 -36 -34 -52" opacity="0.65" stroke-width="2.4"/>
      <path d="M 0 -22 Q 8 -42 0 -60" opacity="0.65" stroke-width="2.4"/>
      <path d="M 34 -18 Q 42 -36 34 -52" opacity="0.65" stroke-width="2.4"/>
      <path d="M -60 30 Q -40 44 -20 30" opacity="0.45" stroke-width="2"/>
      <path d="M 20 30 Q 40 44 60 30" opacity="0.45" stroke-width="2"/>
    </g>

    <!-- nhánh ngải cứu nhỏ (phải dưới) -->
    <g transform="translate(660,370)" opacity="0.8" stroke-width="2.2">
      <path d="M 0 70 Q 6 20 0 -30"/>
      <path d="M 0 40 Q -22 30 -30 8"/>
      <path d="M 0 24 Q 22 16 30 -6"/>
      <path d="M 0 4 Q -18 -4 -24 -24"/>
    </g>
  </g>

  <!-- nhãn tên từng món -->
  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#8A1820">
    <text x="120" y="385">vỗ bát huyệt</text>
    <text x="252" y="400" font-size="16">búa ngải cứu</text>
    <text x="450" y="240">lược gỗ</text>
    <text x="620" y="240">gua sha</text>
    <text x="400" y="468">ngâm chân thảo dược</text>
  </g>

  <!-- tiêu đề nhỏ góc trên -->
  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="400" y="58" fill="#8A1820" font-size="15" letter-spacing="5" opacity="0.85">BỘ DƯỠNG SINH NHẬP MÔN</text>
  </g>

  <!-- divider kim cương -->
  <g transform="translate(400,80)">
    <line x1="-60" y1="0" x2="-14" y2="0" stroke="#8A1820" stroke-width="1" opacity="0.5"/>
    <rect x="-4.5" y="-4.5" width="9" height="9" fill="#8A1820" transform="rotate(45)"/>
    <line x1="14" y1="0" x2="60" y2="0" stroke="#8A1820" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
